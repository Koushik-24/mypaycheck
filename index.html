
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;font-family:Arial,Helvetica,sans-serif;}
body{background:#eef1f5;padding:0;}
#login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0a1628;border-radius:0;padding:1rem;}
.login-box{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:14px;padding:1.75rem 1.25rem;width:100%;max-width:360px;text-align:center;}
.login-logo{width:50px;height:50px;background:#f90;border-radius:12px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#0a1628;}
.login-title{font-size:18px;font-weight:500;color:#fff;margin-bottom:4px;}
.login-sub{font-size:12px;color:rgba(255,255,255,0.38);margin-bottom:1.8rem;}
.lf{margin-bottom:1rem;text-align:left;}
.lf label{display:block;font-size:11px;color:rgba(255,255,255,0.42);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase;}
.lf input{width:100%;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.14);border-radius:8px;padding:10px 14px;font-size:14px;color:#fff;outline:none;font-family:inherit;transition:border-color .2s;}
.lf input:focus{border-color:#f90;}
.lf input::placeholder{color:rgba(255,255,255,0.18);}
.login-btn{width:100%;padding:11px;background:#f90;border:none;border-radius:8px;color:#0a1628;font-size:14px;font-weight:600;cursor:pointer;margin-top:.4rem;font-family:inherit;}
.login-btn:hover{opacity:.88;}
.lerr{color:#ff6b6b;font-size:12px;margin-top:8px;display:none;}
#app{display:none;}
.shell{display:flex;min-height:100dvh;background:#f0f2f5;border-radius:0;overflow:hidden;}
.sb{width:210px;background:#0a1628;display:flex;flex-direction:column;flex-shrink:0;}
.sb-top{padding:12px 14px 8px;border-bottom:0.5px solid rgba(255,255,255,0.07);}
.sb-logo-row{display:flex;align-items:center;gap:9px;}
.sb-ic{width:30px;height:30px;background:#f90;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#0a1628;}
.sb-brand{font-size:13px;font-weight:500;color:#fff;}
.sb-sub{font-size:10px;color:rgba(255,255,255,0.3);}
.sb-nav{padding:8px;flex:1;}
.sb-sec{font-size:10px;color:rgba(255,255,255,0.28);letter-spacing:.07em;text-transform:uppercase;padding:6px 8px 4px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:all .15s;}
.ni:hover{background:rgba(255,255,255,0.06);}
.ni.active{background:rgba(249,153,0,0.14);}
.ni-label{font-size:13px;color:rgba(255,255,255,0.55);}
.ni.active .ni-label{color:#f90;font-weight:500;}
.sb-bot{padding:10px 14px;border-top:0.5px solid rgba(255,255,255,0.07);}
.sb-av{display:flex;align-items:center;gap:8px;}
.av-circle{width:30px;height:30px;background:#1a3a6e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#7baee8;flex-shrink:0;}
.av-name{font-size:12px;color:rgba(255,255,255,0.7);}
.av-email{font-size:10px;color:rgba(255,255,255,0.28);}
.lo-btn{margin-top:8px;width:100%;background:none;border:0.5px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px;color:rgba(255,255,255,0.38);font-size:11px;cursor:pointer;font-family:inherit;}
.lo-btn:hover{color:#fff;border-color:rgba(255,255,255,0.28);}
.main{flex:1;overflow:auto;min-width:0;}
.topbar{background:#fff;border-bottom:0.5px solid #e0e2e6;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.pg-title{font-size:15px;font-weight:500;color:#0a1628;}
.pg-sub{font-size:11px;color:#aaa;}
.content{padding:12px 16px;}
.slabel{font-size:11px;font-weight:500;color:#999;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px;}
.card{background:#fff;border:0.5px solid #e0e2e6;border-radius:10px;padding:12px 14px;min-width:0;}
.mc-l{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.mc-v{font-size:20px;font-weight:500;color:#0a1628;}
.mc-s{font-size:11px;color:#bbb;margin-top:3px;}
.g-green{color:#1a7a4a;} .g-amber{color:#b85c00;} .g-blue{color:#185fa5;}
.ct{font-size:13px;font-weight:500;color:#0a1628;padding-bottom:8px;border-bottom:0.5px solid #eee;margin-bottom:10px;}
.pay-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 9px;border-radius:8px;cursor:pointer;border:0.5px solid transparent;margin-bottom:4px;transition:all .15s;}
.pay-row:hover{background:#f7f8fb;border-color:#e0e2e6;}
.pay-row.active{background:#eef4ff;border-color:#bdd0f5;}
.pm{font-size:13px;font-weight:500;color:#0a1628;}
.pd{font-size:11px;color:#aaa;margin-top:1px;}
.pn{font-size:13px;font-weight:500;color:#1a7a4a;text-align:right;}
.pg{font-size:11px;color:#aaa;text-align:right;}
.dt{width:100%;font-size:12px;border-collapse:collapse;}
.dt td{padding:5px 0;border-bottom:0.5px solid #f3f3f3;}
.dt tr:last-child td{border-bottom:none;}
.dl{color:#777;} .dv{text-align:right;font-weight:500;color:#0a1628;}
.dn{color:#c0392b;} .dp{color:#1a7a4a;}
.dh{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.05em;padding:8px 0 2px;font-weight:500;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.bg-green{background:#e6f7ef;color:#1a7a4a;}
.ch-wrap{position:relative;height:180px;margin-top:6px;}
.ch-leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:11px;color:#777;}
.sw{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;}
.dl-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f7f8fb;border:0.5px solid #e0e2e6;border-radius:8px;margin-top:10px;flex-wrap:wrap;}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.dl-btn-pdf{background:#0a1628;color:#fff;}
.dl-btn-pdf:hover{background:#1a3a6e;}
.dl-btn-csv{background:#f90;color:#0a1628;}
.dl-btn-csv:hover{opacity:.85;}
.dl-btn-print{background:#fff;color:#0a1628;border:0.5px solid #ccc;}
.dl-btn-print:hover{background:#f5f5f5;}
.al-row{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;}
.al-blue{background:#e6f0fb;border:0.5px solid #bdd0f5;}
.al-green{background:#e6f7ef;border:0.5px solid #9fd8bc;}
.al-amber{background:#fef3e2;border:0.5px solid #f5c675;}
.al-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.toast{display:none;align-items:center;gap:10px;padding:10px 16px;background:#1a7a4a;color:#fff;border-radius:8px;font-size:13px;margin-bottom:12px;}
.toast.show{display:flex;}

img,svg,canvas{max-width:100%;}
.pm,.pd,.pn,.pg,.dl,.dv,.av-name,.av-email,.pg-title,.pg-sub{overflow-wrap:anywhere;}
.dt{table-layout:auto;}

@media (max-width:1100px){
  .g4{grid-template-columns:repeat(2,minmax(0,1fr));}
  .g2{grid-template-columns:1fr;}
}

@media (max-width:760px){
  .shell{display:block;min-height:100dvh;overflow:visible;}
  .sb{width:100%;position:sticky;top:0;z-index:10;display:block;}
  .sb-top{padding:10px 12px;}
  .sb-nav{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:8px 10px;border-top:0.5px solid rgba(255,255,255,0.06);}
  .sb-sec{display:none;}
  .ni{flex:0 0 auto;margin:0;padding:7px 10px;}
  .ni-label{white-space:nowrap;font-size:12px;}
  .sb-bot{display:none;}
  .main{overflow:visible;}
  .topbar{padding:10px 12px;align-items:flex-start;}
  .content{padding:10px 12px;}
  .g4{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .g2{gap:10px;margin-bottom:10px;}
  .card{padding:10px 11px;border-radius:9px;}
  .mc-v{font-size:18px;}
  .ch-wrap{height:165px;}
  .pay-row{align-items:flex-start;}
  .dl-btn{flex:1 1 130px;}
}

@media (max-width:480px){
  #login-screen{padding:.75rem;}
  .login-box{padding:1.35rem 1rem;}
  .login-logo{width:44px;height:44px;font-size:15px;margin-bottom:.75rem;}
  .login-sub{margin-bottom:1.2rem;}
  .topbar{display:block;}
  .topbar>div:last-child{margin-top:4px;font-size:11px!important;}
  .content{padding:8px;}
  .g4{grid-template-columns:1fr;}
  .card{padding:9px 10px;}
  .pay-row{display:block;}
  .pay-row>div:last-child{text-align:left;margin-top:4px;}
  .pn,.pg{text-align:left;}
  .dt{font-size:11px;}
  .dt td{padding:4px 0;vertical-align:top;}
  .dv{padding-left:8px;}
  .ch-wrap{height:150px;}
  .ch-leg{gap:7px;font-size:10px;}
  .al-row{font-size:11px;}
}

function downloadCSV(i){
  const p=PC[i];
  const rows=[
    ['AMAZON WEB SERVICES INC — EARNINGS STATEMENT'],
    ['Employee','KOUSHIK PONUGOTI'],
    ['Pay Period',p.period],['Pay Date',p.payDate],['Advice Number',p.advice],[''],
    ['EARNINGS','Amount'],
    ...p.earnings.map(e=>[e.l,e.a.toFixed(2)]),
    ['Gross Pay',p.gross.toFixed(2)],[''],
    ['STATUTORY DEDUCTIONS','Amount'],
    ...p.stat.map(e=>[e.l,(-e.a).toFixed(2)]),[''],
    ['OTHER DEDUCTIONS','Amount'],
    ...p.other.map(e=>[e.l,(-e.a).toFixed(2)]),[''],
    ['NET PAY',p.net.toFixed(2)],
  ];
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');

  a.download=`Paycheck_${p.month.replace(' ','_')}.csv`;
  a.click();
  showToast('CSV downloaded successfully!');
}
